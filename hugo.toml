# Replace baseURL with your real URL once you know it.
# For a custom domain, just the root domain (set here already).
baseURL = "https://nckslvr.mn/"
title = "Nick Silverman"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
pygmentsUseClasses = true

[languages.en]
  label = "English"
  locale = "en-us"
  weight = 1

[outputs]
  home = ["HTML", "RSS", "JSON"]

[minify]
  disableXML = true
  minifyOutput = true

[params]
  defaultTheme = "auto"
  disableThemeToggle = false
  mainSections = []
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = true
  [params.label]
    text = "nckslvr.mn"

   [[params.socialIcons]]
     name = "github"
     title = "github"
     url = "https://github.com/nckslvrmn"

   [[params.socialIcons]]
     name = "linkedin"
     title = "linkedin"
     url = "https://lnkd.in/FSBXQP"

[menu]
  [[menu.main]]
    identifier = "home"
    name = ""
    title = "Home"
    pre = '<svg class="home-icon" aria-label="Home" role="img" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>'
    url = "/"
    weight = 5
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "archive"
    name = "Archive"
    url = "/archives/"
    weight = 30
  [[menu.main]]
    identifier = "resume"
    name = "Resume"
    url = "/resume/"
    weight = 40

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
