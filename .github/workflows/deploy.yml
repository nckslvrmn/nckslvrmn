name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --gc --minify
      - name: Restore cached resume PDF
        id: resume-pdf
        uses: actions/cache@v4
        with:
          path: .resume-pdf/resume.pdf
          key: resume-pdf-${{ hashFiles('data/resume.json', 'layouts/resume.html', 'layouts/_partials/resume-*.html', 'assets/css/resume.css', 'scripts/build-resume-pdf.sh') }}
      - name: Build resume PDF
        if: steps.resume-pdf.outputs.cache-hit != 'true'
        run: ./scripts/build-resume-pdf.sh public .resume-pdf/resume.pdf
      - name: Add resume PDF to site
        run: cp .resume-pdf/resume.pdf public/resume.pdf
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
